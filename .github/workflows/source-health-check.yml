name: Source Health Check

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      notify:
        description: 'Send notifications on failures'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read
  issues: write

env:
  PYTHONUNBUFFERED: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  source-health-check:
    name: Comprehensive Source Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run source health check
      env:
        # API Keys (from GitHub Secrets)
        PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
        CROSSREF_API_KEY: ${{ secrets.CROSSREF_API_KEY }}
        SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        NEWSAPI_API_KEY: ${{ secrets.NEWSAPI_API_KEY }}
        STACKEXCHANGE_API_KEY: ${{ secrets.STACKEXCHANGE_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      run: |
        python scripts/source_health_check.py health-check-results.json
    
    - name: Upload health check results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: source-health-check-results
        path: health-check-results.json
        retention-days: 7
    
    - name: Generate health check report
      if: always()
      run: |
        python << 'EOF'
        import json
        from datetime import datetime
        
        try:
            with open('health-check-results.json', 'r') as f:
                data = json.load(f)
            
            summary = data['summary']
            sources = data['sources']
            
            print("\n" + "="*80)
            print("SOURCE HEALTH CHECK SUMMARY")
            print("="*80)
            print(f"Timestamp: {summary['timestamp']}")
            print(f"Total Sources: {summary['total_sources']}")
            print(f"Healthy: {summary['healthy']} ({summary['health_percentage']}%)")
            print(f"Degraded: {summary['degraded']}")
            print(f"Unhealthy: {summary['unhealthy']}")
            print(f"API Keys Configured: {summary['api_keys_configured']}")
            print(f"API Keys Invalid: {summary['api_keys_invalid']}")
            print("="*80 + "\n")
            
            # List unhealthy sources
            unhealthy = [s for s in sources if s['status'] == 'unhealthy']
            if unhealthy:
                print("UNHEALTHY SOURCES:")
                for source in unhealthy:
                    print(f"  - {source['name']}: {source['error_message']}")
                print()
            
            # List degraded sources
            degraded = [s for s in sources if s['status'] == 'degraded']
            if degraded:
                print("DEGRADED SOURCES:")
                for source in degraded:
                    print(f"  - {source['name']}: {source['error_message']}")
                print()
            
            # List sources without API keys
            no_key = [s for s in sources if not s['api_key_configured'] and s.get('details', {}).get('api_key_env')]
            if no_key:
                print("SOURCES MISSING API KEYS:")
                for source in no_key:
                    key_env = source.get('details', {}).get('api_key_env')
                    print(f"  - {source['name']}: {key_env}")
                print()
            
        except Exception as e:
            print(f"Error generating report: {e}")
        EOF
    
    - name: Check for critical failures
      if: always()
      run: |
        python << 'EOF'
        import json
        import sys
        
        try:
            with open('health-check-results.json', 'r') as f:
                data = json.load(f)
            
            summary = data['summary']
            sources = data['sources']
            
            # Check for critical issues
            critical_issues = []
            
            # Check if more than 50% of sources are unhealthy
            if summary['health_percentage'] < 50:
                critical_issues.append(f"Less than 50% of sources are healthy ({summary['health_percentage']}%)")
            
            # Check for authentication failures
            auth_failures = [s for s in sources if s.get('details', {}).get('auth_error')]
            if auth_failures:
                critical_issues.append(f"Authentication failures: {', '.join(s['name'] for s in auth_failures)}")
            
            # Check for access denied
            access_errors = [s for s in sources if s.get('details', {}).get('access_error')]
            if access_errors:
                critical_issues.append(f"Access denied: {', '.join(s['name'] for s in access_errors)}")
            
            if critical_issues:
                print("CRITICAL ISSUES DETECTED:")
                for issue in critical_issues:
                    print(f"  - {issue}")
                sys.exit(1)
            else:
                print("No critical issues detected")
                sys.exit(0)
                
        except Exception as e:
            print(f"Error checking for failures: {e}")
            sys.exit(1)
        EOF
    
    - name: Create GitHub Issue for persistent failures
      if: failure() && github.event.inputs.notify == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          try {
            const data = JSON.parse(fs.readFileSync('health-check-results.json', 'utf8'));
            const summary = data.summary;
            const sources = data.sources;
            
            const unhealthy = sources.filter(s => s.status === 'unhealthy');
            const degraded = sources.filter(s => s.status === 'degraded');
            
            if (unhealthy.length === 0) {
              console.log('No unhealthy sources, skipping issue creation');
              return;
            }
            
            const title = `Source Health Check Failure - ${new Date().toISOString()}`;
            const body = `
          # Source Health Check Report
          
          **Timestamp:** ${summary.timestamp}
          **Health Score:** ${summary.health_percentage}%
          
          ## Summary
          - Total Sources: ${summary.total_sources}
          - Healthy: ${summary.healthy}
          - Degraded: ${summary.degraded}
          - Unhealthy: ${summary.unhealthy}
          
          ## Unhealthy Sources
          ${unhealthy.map(s => `- **${s.name}**: ${s.error_message}`).join('\n')}
          
          ## Degraded Sources
          ${degraded.map(s => `- **${s.name}**: ${s.error_message}`).join('\n')}
          
          ## Action Required
          Please investigate the unhealthy sources and take appropriate action:
          - Check API key configuration
          - Verify API key validity
          - Check for rate limiting or blocking
          - Verify API endpoint availability
          
          ---
          *Automated report from Source Health Check workflow*
          `;
            
            // Check if there's already an open issue for this
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['health-check']
            });
            
            const existingIssue = issues.data.find(issue => 
              issue.title.includes('Source Health Check Failure')
            );
            
            if (existingIssue) {
              // Update existing issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
              console.log(`Updated existing issue #${existingIssue.number}`);
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['health-check', 'automated']
              });
              console.log('Created new issue');
            }
            
          } catch (error) {
            console.error('Error creating issue:', error);
          }
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    - name: Comment on PR if health check fails
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          try {
            const data = JSON.parse(fs.readFileSync('health-check-results.json', 'utf8'));
            const summary = data.summary;
            const sources = data.sources;
            
            const unhealthy = sources.filter(s => s.status === 'unhealthy');
            
            const body = `
          ⚠️ **Source Health Check Failed**
          
          **Health Score:** ${summary.health_percentage}%
          **Unhealthy Sources:** ${unhealthy.length}
          
          ${unhealthy.map(s => `- ${s.name}: ${s.error_message}`).join('\n')}
          
          Please review the full health check results in the workflow logs.
          `;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
            
          } catch (error) {
            console.error('Error creating comment:', error);
          }
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  target-health-check:
    name: Target Health Check (Hugging Face)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests huggingface_hub
    
    - name: Check Hugging Face datasets
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python << 'EOF'
        import requests
        import os
        from datetime import datetime
        
        datasets = [
            "nellaivijay/ml-research-daily",
            "nellaivijay/llm-research-daily",
            "nellaivijay/agi-research-daily",
            "nellaivijay/asi-research-daily",
            "nellaivijay/aci-research-daily",
            "nellaivijay/ani-research-daily"
        ]
        
        token = os.getenv("HF_TOKEN")
        
        print("\n" + "="*80)
        print("HUGGING FACE DATASET HEALTH CHECK")
        print("="*80)
        print(f"Timestamp: {datetime.utcnow().isoformat()}")
        print()
        
        all_healthy = True
        
        for dataset in datasets:
            try:
                url = f"https://huggingface.co/api/datasets/{dataset}"
                headers = {}
                if token:
                    headers["Authorization"] = f"Bearer {token}"
                
                response = requests.get(url, headers=headers, timeout=10)
                
                if response.status_code == 200:
                    data = response.json()
                    card_data = data.get("cardData", {})
                    likes = data.get("likes", 0)
                    downloads = data.get("downloads", 0)
                    
                    print(f"✓ {dataset}")
                    print(f"  Status: Available")
                    print(f"  Likes: {likes}")
                    print(f"  Downloads: {downloads}")
                    print(f"  Last Modified: {data.get('lastModified', 'Unknown')}")
                elif response.status_code == 404:
                    print(f"✗ {dataset}")
                    print(f"  Status: Not Found")
                    all_healthy = False
                elif response.status_code == 403:
                    print(f"✗ {dataset}")
                    print(f"  Status: Access Forbidden")
                    all_healthy = False
                else:
                    print(f"✗ {dataset}")
                    print(f"  Status: HTTP {response.status_code}")
                    all_healthy = False
                print()
                
            except requests.exceptions.Timeout:
                print(f"✗ {dataset}")
                print(f"  Status: Timeout")
                all_healthy = False
                print()
            except Exception as e:
                print(f"✗ {dataset}")
                print(f"  Status: Error - {str(e)}")
                all_healthy = False
                print()
        
        print("="*80)
        
        if not all_healthy:
            exit(1)
        EOF
