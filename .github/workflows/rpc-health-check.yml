name: RPC Health Check

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:

jobs:
  health-check:
    name: API Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        api:
          - name: Crossref
            url: https://api.crossref.org/works
          - name: Semantic Scholar
            url: https://api.semanticscholar.org/graph/v1/paper/search
          - name: PubMed
            url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi
          - name: Papers With Code
            url: https://paperswithcode.com/api/v1/papers

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Health check: ${{ matrix.api.name }}
      run: |
        python -c "
        import requests
        import sys
        from datetime import datetime

        url = '${{ matrix.api.url }}'
        print(f'Checking {url} at {datetime.utcnow()}')
        
        try:
            response = requests.get(url, timeout=10)
            if response.status_code in [200, 201, 202, 204]:
                print(f'✓ ${{ matrix.api.name }} is healthy (status: {response.status_code})')
                sys.exit(0)
            else:
                print(f'✗ ${{ matrix.api.name }} returned status {response.status_code}')
                sys.exit(1)
        except requests.exceptions.Timeout:
            print(f'✗ ${{ matrix.api.name }} timed out')
            sys.exit(1)
        except Exception as e:
            print(f'✗ ${{ matrix.api.name }} error: {e}')
            sys.exit(1)
        "

    - name: Notify on failure
      if: failure()
      run: |
        echo "Health check failed for ${{ matrix.api.name }}"
