# GitLab CI/CD for Research-Collector
# Schedules daily research for all topics with append mode

stages:
  - research
  - cleanup

variables:
  PYTHONUNBUFFERED: 1
  HF_HUB_ENABLE_HF_TRANSFER: 1
  DATASET_OWNER: $CI_PROJECT_NAMESPACE

# ML Research - Daily Schedule
research-ml:
  stage: research
  image: python:3.10
  script:
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
    - python -m research_collector research --topic ml --days 7 --export huggingface --output $DATASET_OWNER/ml-research-daily --append --no-cache --no-history
  only:
    - schedules
    - main
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
  tags:
    - docker

