<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research-Collector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
        }
        
        .search-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 20px;
        }
        
        .result-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: background-color 0.2s;
        }
        
        .result-item:hover {
            background-color: #f9f9f9;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: #666;
        }
        
        .source-tag {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85em;
        }
        
        .result-content {
            color: #555;
            line-height: 1.6;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .topic-card {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .topic-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .topic-card h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .topic-card p {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔬 Research-Collector</h1>
            <p>Educational multi-source research aggregation tool</p>
        </div>
        
        <div class="search-form">
            <div class="form-group">
                <label for="topic">Search Topic</label>
                <input type="text" id="topic" placeholder="Enter your research topic...">
            </div>
            
            <div class="form-group">
                <label>Quick Topics</label>
                <div class="topics-grid">
                    {% for key, topic_info in topics.items() %}
                    <div class="topic-card" onclick="selectTopic('{{ topic_info.name }}')">
                        <h4>{{ topic_info.name }}</h4>
                        <p>{{ topic_info.keywords[0] }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
            
            <div class="form-group">
                <label for="days">Time Range (days)</label>
                <select id="days">
                    <option value="7">7 days</option>
                    <option value="14">14 days</option>
                    <option value="30">30 days</option>
                    <option value="90">90 days</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="sources">Sources (optional, comma-separated)</label>
                <input type="text" id="sources" placeholder="e.g., pubmed,reddit,stackoverflow">
            </div>
            
            <button class="btn" onclick="runSearch()" id="searchBtn">🔍 Search</button>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Running research...</p>
        </div>
        
        <div class="results" id="results">
            <h2>Results</h2>
            <div id="resultsList"></div>
        </div>
    </div>
    
    <script>
        function selectTopic(topicName) {
            document.getElementById('topic').value = topicName;
        }
        
        async function runSearch() {
            const topic = document.getElementById('topic').value;
            const days = document.getElementById('days').value;
            const sources = document.getElementById('sources').value;
            
            if (!topic) {
                alert('Please enter a topic');
                return;
            }
            
            const searchBtn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');
            
            searchBtn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';
            
            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        topic: topic,
                        days: parseInt(days),
                        sources: sources || null
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    displayResults(data);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                searchBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        function displayResults(data) {
            const results = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');
            
            resultsList.innerHTML = '';
            
            if (data.items.length === 0) {
                resultsList.innerHTML = '<p>No results found.</p>';
            } else {
                data.items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-title">${item.title}</div>
                        <div class="result-meta">
                            <span class="source-tag">${item.source}</span>
                            <span class="meta-tag">👤 ${item.author}</span>
                            <span class="meta-tag">📅 ${item.published_date}</span>
                            <span class="meta-tag">⭐ ${item.score.toFixed(2)}</span>
                        </div>
                        <div class="result-content">${item.content.substring(0, 300)}...</div>
                    `;
                    resultsList.appendChild(div);
                });
            }
            
            results.style.display = 'block';
        }
    </script>
</body>
</html>
