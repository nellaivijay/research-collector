# Manual Research - Can be triggered manually for any topic or all
research-manual:
  stage: research
  image: python:3.10
  script:
    - pip install --upgrade pip
    - pip install -r requirements-dev.txt
    - |
      if [ "$TOPIC" = "all" ]; then
        echo "Running research for all topics..."
        python -m research_collector research --topic ml --days $DAYS --export huggingface --output $DATASET_OWNER/ml-research-daily --append --no-cache --no-history
        python -m research_collector research --topic llm --days $DAYS --export huggingface --output $DATASET_OWNER/llm-research-daily --append --no-cache --no-history
        python -m research_collector research --topic agi --days $DAYS --export huggingface --output $DATASET_OWNER/agi-research-daily --append --no-cache --no-history
        python -m research_collector research --topic asi --days $DAYS --export huggingface --output $DATASET_OWNER/asi-research-daily --append --no-cache --no-history
        python -m research_collector research --topic ani --days $DAYS --export huggingface --output $DATASET_OWNER/ani-research-daily --append --no-cache --no-history
        python -m research_collector research --topic aci --days $DAYS --export huggingface --output $DATASET_OWNER/aci-research-daily --append --no-cache --no-history
      else
        python -m research_collector research --topic $TOPIC --days $DAYS --export huggingface --output $DATASET_OWNER/$TOPIC-research-daily --append --no-cache --no-history
      fi
  only:
    - main
  when: manual
  variables:
    TOPIC: "all"
    DAYS: "7"
  tags:
    - docker

# Cleanup All Datasets - Manual trigger only
cleanup-all-datasets:
  stage: cleanup
  image: python:3.10
  script:
    - pip install huggingface_hub
    - python cleanup_all_datasets.py --dataset all
  only:
    - main
  when: manual
  tags:
    - docker

# Cleanup Specific Dataset - Manual trigger
cleanup-dataset:
  stage: cleanup
  image: python:3.10
  script:
    - pip install huggingface_hub
    - python cleanup_all_datasets.py --dataset $DATASET
  only:
    - main
  when: manual
  variables:
    DATASET: "ml"
  tags:
    - docker
