name: Truncate Dataset Records

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm truncation of ALL dataset records'
        required: true
        type: string
      dataset:
        description: 'Dataset to truncate (all, ml, llm, agi, asi, ani, aci)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ml
          - llm
          - agi
          - asi
          - ani
          - aci

env:
  PYTHONUNBUFFERED: 1
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  truncate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install huggingface_hub
    
    - name: Validate confirmation
      run: |
        if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
          echo "Error: Confirmation must be 'yes'"
          echo "Please type 'yes' to confirm truncation"
          exit 1
        fi
        echo "Confirmation verified"
    
    - name: Validate HF_TOKEN
      run: |
        if [ -z "$HF_TOKEN" ]; then
          echo "Error: HF_TOKEN is not set"
          echo "Please add HF_TOKEN to GitHub Secrets"
          exit 1
        fi
        if [ ${#HF_TOKEN} -lt 10 ]; then
          echo "Error: HF_TOKEN appears to be invalid (too short)"
          exit 1
        fi
        echo "HF_TOKEN is valid"
    
    - name: Truncate dataset records
      run: |
        python cleanup_all_datasets.py --dataset ${{ github.event.inputs.dataset }}
