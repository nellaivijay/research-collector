name: Scheduled Research

on:
  schedule:
    # Daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Research topic (ml, llm, agi, asi, ani, aci, or custom)'
        required: true
        default: 'ml'
        type: choice
        options:
          - ml
          - llm
          - agi
          - asi
          - ani
          - aci
          - custom
      days:
        description: 'Number of days to research'
        required: false
        default: '7'
        type: choice
        options:
          - '3'
          - '7'
          - '14'
          - '30'
      custom_query:
        description: 'Custom search query (if topic=custom)'
        required: false
      sources:
        description: 'Specific sources (comma-separated, leave empty for all)'
        required: false

env:
  PYTHONUNBUFFERED: 1
  HF_HUB_ENABLE_HF_TRANSFER: 1
  DATASET_OWNER: ${{ github.repository_owner }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  research-ml:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.topic == 'ml')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
    
    - name: Cache Hugging Face models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: ${{ runner.os }}-hf-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-hf-
    
    - name: Validate HF_TOKEN
      run: |
        if [ -z "$HF_TOKEN" ]; then
          echo "Error: HF_TOKEN is not set"
          echo "Please add HF_TOKEN to GitHub Secrets"
          echo "Get your token from: https://huggingface.co/settings/tokens"
          exit 1
        fi
        if [ ${#HF_TOKEN} -lt 10 ]; then
          echo "Error: HF_TOKEN appears to be invalid (too short)"
          exit 1
        fi
        echo "HF_TOKEN is set and appears valid"
    
    - name: Run ML research and export to Hugging Face
      run: |
        set -e
        echo "Starting ML research..."
        START_TIME=$(date +%s)
        
        # Run research and capture output
        python -m research_collector research \
          --topic ml \
          --days ${{ github.event.inputs.days || '7' }} \
          --export=huggingface \
          --output $DATASET_OWNER/ml-research-daily \
          --no-cache \
          --no-history \
          --append 2>&1 | tee research-output.log || {
          echo "Research failed with exit code $?"
          echo "=== Research Output ==="
          cat research-output.log
          exit 1
        }
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Research completed in ${DURATION}s"
        echo "duration=${DURATION}" >> $GITHUB_OUTPUT
    
    - name: Validate dataset
      if: success()
      run: |
        python -c "
        from datasets import load_dataset
        try:
            dataset = load_dataset('$DATASET_OWNER/ml-research-daily')
            print(f'Dataset loaded successfully: {len(dataset[\"train\"])} items')
            assert len(dataset['train']) > 0, 'Dataset is empty'
        except Exception as e:
            print(f'Dataset validation failed: {e}')
            exit(1)
        "

