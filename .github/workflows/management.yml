name: Management

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:
    inputs:
      task:
        description: 'Management task to run'
        required: true
        type: choice
        options:
          - cleanup-old-artifacts
          - generate-report
          - check-dependencies
          - audit-security

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    if: github.event.inputs.task == 'cleanup-old-artifacts' || (github.event_name == 'schedule')
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
    - name: Delete old artifacts
      uses: actions/github-script@v6
      with:
        script: |
          const artifacts = await github.rest.actions.listArtifactsForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
          });
          
          const expiredArtifacts = artifacts.data.artifacts.filter(
            artifact => {
              const created = new Date(artifact.created_at);
              const daysOld = (Date.now() - created.getTime()) / (1000 * 60 * 60 * 24);
              return daysOld > 30;
            }
          );
          
          for (const artifact of expiredArtifacts) {
            await github.rest.actions.deleteArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: artifact.id,
            });
            console.log(`Deleted artifact: ${artifact.name}`);
          }
          
          console.log(`Deleted ${expiredArtifacts.length} artifacts older than 30 days`);

  generate-report:
    name: Generate Weekly Report
    if: github.event.inputs.task == 'generate-report'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate report
      run: |
        echo "Generating weekly management report..."
        # Add report generation logic here

  check-dependencies:
    name: Check Dependencies
    if: github.event.inputs.task == 'check-dependencies'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Check for outdated dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip-audit

    - name: Check for security vulnerabilities
      run: |
        pip install safety
        safety check

  audit-security:
    name: Security Audit
    if: github.event.inputs.task == 'audit-security'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run security audit
      run: |
        bandit -r research_collector/ -f json -o bandit-report.json
        safety check --json > safety-report.json

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json
